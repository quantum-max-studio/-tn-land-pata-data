name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: List files for debugging
        run: ls -R

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd mobile_wrapper
          flutter pub get

      - name: Build APK
        run: |
          cd mobile_wrapper
          flutter build apk --release --no-pub

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: tngis-factory-finder-apk
          path: mobile_wrapper/build/app/outputs/flutter-apk/app-release.apk
